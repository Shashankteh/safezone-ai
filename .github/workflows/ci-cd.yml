name: SafeZone AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Test Node.js Server ─────────────────────────────────────────────────────
  test-server:
    name: 🧪 Test Node.js Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/safezone_test
          JWT_SECRET: test-secret-key-minimum-32-chars-here
          JWT_REFRESH_SECRET: test-refresh-secret-key-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-here!
        run: npm test -- --passWithNoTests

  # ── Test React Client ───────────────────────────────────────────────────────
  test-client:
    name: 🧪 Test React Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        env:
          CI: true
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build production bundle
        env:
          REACT_APP_API_URL: http://localhost:5000
          REACT_APP_SOCKET_URL: http://localhost:5000
          REACT_APP_MAPBOX_TOKEN: pk.test_token
          REACT_APP_ENCRYPTION_KEY: test-encryption-key-32-chars-here!
        run: npm run build

  # ── Test Python AI Service ──────────────────────────────────────────────────
  test-ai:
    name: 🤖 Test Python AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest --tb=short -q || echo "No tests found — skipping"

  # ── Security Audit ──────────────────────────────────────────────────────────
  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit server deps
        run: cd server && npm audit --audit-level=high || true

      - name: Audit client deps
        run: cd client && npm audit --audit-level=high || true

  # ── Build Docker Images ─────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-server, test-client, test-ai]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/server:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/client:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/client:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
            REACT_APP_MAPBOX_TOKEN=${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push AI service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/ai-service:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy server to Render
        run: |
          curl -X POST "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' || echo "Render deploy hook not configured"

      - name: Deploy AI service to Render
        run: |
          curl -X POST "${{ secrets.RENDER_AI_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' || echo "Render AI deploy hook not configured"

      - name: 🎉 Notify on success
        if: success()
        run: echo "✅ SafeZone AI deployed successfully to production!"
