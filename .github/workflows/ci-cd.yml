name: SafeZone AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: 🧪 Test Node.js Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: cd server && npm ci
      - run: cd server && npm test --if-present || true

  test-client:
    name: 🎨 Test React Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: cd client && npm ci --legacy-peer-deps
      - name: Build
        run: cd client && npm run build
        env:
          CI: false
          REACT_APP_API_URL: https://safezone-backend-odpd.onrender.com/api
          REACT_APP_SOCKET_URL: https://safezone-backend-odpd.onrender.com
          REACT_APP_ENCRYPTION_KEY: safezone-32char-encrypt-key-2024!

  test-ai:
    name: 🤖 Test Python AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: cd ai-service && pip install -r requirements.txt
      - run: cd ai-service && python -m pytest || true
